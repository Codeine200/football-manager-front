<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Teams</title>
    <link rel="stylesheet" href="src/assets/normalize.css" />
    <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
<div class="container">
    <div class="content">
        <div class="search">
            <form class="search__form" action="">
                <div class="search__field">
                    <img class="search__icon" src="./images/search.svg" alt="search" />
                    <input class="search__input" type="text" placeholder="Search your team" />
                </div>
                <button class="cancel">Cancel</button>
            </form>
        </div>
        <div class="teams">
            <div class="teams__item">
                <div class="teams__logo">
                    <img src="images/barselona.png" alt="" class="teams__image">
                </div>
                <div class="teams__name"><a class="teams__link" href="#">Barselona</a></div>
            </div>
            <div class="teams__item">
                <div class="teams__logo">
                    <img src="images/arsenal.png" alt="" class="teams__image">
                </div>
                <div class="teams__name"><a class="teams__link" href="#">Arsenal</a></div>
            </div>
            <div class="teams__item">
                <div class="teams__logo">
                    <img src="images/chelsea.png" alt="" class="teams__image">
                </div>
                <div class="teams__name"><a class="teams__link" href="#">Chelsea</a></div>
            </div>
            <div class="teams__item">
                <div class="teams__logo">
                    <img src="images/liverpool.png" alt="" class="teams__image">
                </div>
                <div class="teams__name"><a class="teams__link" href="#">Liverpool</a></div>
            </div>
            <div class="teams__item">
                <div class="teams__logo">
                    <img src="images/realmadrid.png" alt="" class="teams__image">
                </div>
                <div class="teams__name"><a class="teams__link" href="#">Real Madrid</a></div>
            </div>
        </div>
    </div>
    <div class="menu">

    </div>
</div>
</body>
</html>
