<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Teams</title>
    <link rel="stylesheet" href="src/assets/normalize.css" />
    <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="search">
                <form class="search__form" action="">
                    <div class="search__field">
                        <img class="search__icon" src="./images/search.svg" alt="search" />
                        <input class="search__input" type="text" placeholder="Search your player" />
                    </div>
                    <button class="cancel">Cancel</button>
                </form>
            </div>
            <div class="team">
                <div class="team__background">
                    <img src="images/barselona.png" alt="barselona" class="team__img">
                </div>
                <h1 class="team__title">Barselona</h1>
            </div>
            <div class="players">
                <div class="players__item">
                    <div class="players__logo">
                        <img src="images/players/alvaro_cortes_moyano.webp" alt="" class="players__image">
                    </div>
                    <div class="players__name">Álvaro Cortés Moyano</div>
                </div>
                <div class="players__item">
                    <div class="players__logo">
                        <img src="images/players/andreas_christensen.webp" alt="" class="players__image">
                    </div>
                    <div class="players__name">Andreas Christensen</div>
                </div>
                <div class="players__item">
                    <div class="players__logo">
                        <img src="images/players/diego_kochen.webp" alt="" class="players__image">
                    </div>
                    <div class="players__name">Diego Kochen</div>
                </div>
                <div class="players__item">
                    <div class="players__logo">
                        <img src="images/players/eric_garcia.webp" alt="" class="players__image">
                    </div>
                    <div class="players__name">Eric García</div>
                </div>
                <div class="players__item">
                    <div class="players__logo">
                        <img src="images/players/gerard_martin_langreo.webp" alt="" class="players__image">
                    </div>
                    <div class="players__name">Gerard Martín Langreo</div>
                </div>
                <div class="players__item">
                    <div class="players__logo">
                        <img src="images/players/guillermo_fernandez_casino.webp" alt="" class="players__image">
                    </div>
                    <div class="players__name">Guillermo Fernández Casino</div>
                </div>
                <div class="players__item">
                    <div class="players__logo">
                        <img src="images/players/jofre_torrent_salvat.webp" alt="" class="players__image">
                    </div>
                    <div class="players__name">Jofre Torrents Salvat</div>
                </div>
                <div class="players__item">
                    <div class="players__logo">
                        <img src="images/players/juan_hernandez_torres.webp" alt="" class="players__image">
                    </div>
                    <div class="players__name">Juan Hernández Torres</div>
                </div>
                <div class="players__item">
                    <div class="players__logo">
                        <img src="images/players/jules_olivier_kounde.webp" alt="" class="players__image">
                    </div>
                    <div class="players__name">Jules Olivier Koundé</div>
                </div>
                <div class="players__item">
                    <div class="players__logo">
                        <img src="images/players/wojciech_szczesny.webp" alt="" class="players__image">
                    </div>
                    <div class="players__name">Wojciech Szczęsny</div>
                </div>
                <div class="players__item">
                    <div class="players__logo">
                        <img src="images/players/daniel_dani_carvajal.webp" alt="" class="players__image">
                    </div>
                    <div class="players__name">Daniel „Dani“ Olmo Carvajal</div>
                </div>
            </div>
        </div>
        <div class="menu">

        </div>
    </div>
</body>
</html>
