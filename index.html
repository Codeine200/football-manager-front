<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Login</title>
    <link rel="stylesheet" href="./styles/normalize.css" />
    <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
    <div class="login">
        <div class="login__form">
            <div class="login__line"></div>
            <div class="login__title">Welcome</div>
            <div class="login__field login__field--email">
                <img class="login__icon" src="./images/message.svg" alt="email" />
                <input class="login__input" type="text" placeholder="Email" />
            </div>
            <div class="login__field login__field--password">
                <img class="login__icon" src="./images/password.svg" alt="password" />
                <input class="login__input" type="text" placeholder="Password" />
                <img class="login__hide" src="./images/hide.svg" alt="hide" />
            </div>
            <button class="button login__button">Sign in</button>
        </div>
    </div>
</body>
</html>
