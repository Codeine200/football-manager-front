<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Matches</title>
    <link rel="stylesheet" href="./styles/normalize.css" />
    <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
<div class="container">
    <div class="content">
        <div class="search">
            <form class="search__form" action="">
                <div class="search__field">
                    <img class="search__icon" src="./images/search.svg" alt="search" />
                    <input class="search__input" type="text" placeholder="Search your team" />
                </div>
                <button class="cancel">Cancel</button>
            </form>
        </div>
        <div class="matches">
            <div class="matches__item">
                <div class="matches__teams">
                    <a class="matches__team1" href="#"><img class="matches__img" src="images/barselona.png" alt="barselona"></a>
                    <a class="matches__team2" href="#"><img class="matches__img" src="images/realmadrid.png" alt="realmadrid"></a>
                </div>
                <div class="matches__result">
                    <div class="matches__team_name1">
                        <a href="">Barcelona</a>
                        <div class="matches__goals">3</div>
                    </div>
                    <div class="matches__vs">
                        <div>vs</div>
                        <div>-</div>
                    </div>
                    <div class="matches__team_name2">
                        <a href="">Real Madrid</a>
                        <div class="matches__goals">2</div>
                    </div>
                </div>
            </div>

            <div class="matches__item">
                <div class="matches__teams">
                    <a class="matches__team1" href="#"><img class="matches__img" src="images/arsenal.png" alt="arsenal"></a>
                    <a class="matches__team2" href="#"><img class="matches__img" src="images/astonvilla.png" alt="astonvilla"></a>
                </div>
                <div class="matches__result">
                    <div class="matches__team_name1">
                        <a href="">Arsenal</a>
                        <div class="matches__goals">0</div>
                    </div>
                    <div class="matches__vs">
                        <div>vs</div>
                        <div>-</div>
                    </div>
                    <div class="matches__team_name2">
                        <a href="">Aston Villa</a>
                        <div class="matches__goals">0</div>
                    </div>
                </div>
            </div>


        </div>
    </div>
    <div class="menu">

    </div>
</div>
</body>
</html>
